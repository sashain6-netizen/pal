<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pal | Personal School Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Montserrat:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
  <div class="scene">
    <div class="logo-wrapper">
      <div class="logo-container" id="logoContainer">
        
        <svg class="pal-text" id="palText" viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
              <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(10,45,143,0.15)"/>
            </filter>
            <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
            </linearGradient>
          </defs>

          <g transform="skewX(-7)" filter="url(#shadow)">
            <text
                x="50%"
                y="85"
                text-anchor="middle"
                font-family="'Varela Round', sans-serif"
                font-weight="900"
                font-size="100"
                fill="url(#blueGrad)"
                letter-spacing="-1"
            >PAL</text>
            </g>
        </svg>

        <svg class="smile-svg" id="smileSvg" viewBox="0 0 320 40" xmlns="http://www.w3.org/2000/svg">
          <path
            id="smilePath"
            d="M 60 10 C 100 35, 220 35, 260 10"
            fill="none"
            stroke="url(#blueGrad)"
            stroke-width="8"
            stroke-linecap="round"
          />
        </svg>
      </div>

      <p class="tagline" id="tagline">For you, at every place, at every time</p>
    </div>

    <div class="bg-circle bg-circle--1"></div>
    <div class="bg-circle bg-circle--2"></div>
    <div class="bg-circle bg-circle--3"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
