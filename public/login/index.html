<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • Pal</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><a href="/">PAL</a></div>
    <h1>Welcome Back</h1>
    <form id="loginForm">
      <div class="input-group">
        <label for="identifier">Username or Email</label>
        <input type="text" id="identifier" placeholder="Enter either one" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="nav-btn auth-btn">Log In</button>
    </form>
    <p class="switch-link">New? <a href="/signup">Create account</a></p>
  </div>
  <div id="toast-container" class="toast-container"></div>
  <script src="script.js"></script>
</body>
</html>
