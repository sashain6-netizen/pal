<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Reward • Pal</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/daily/style.css">
</head>
<body>
    <div class="claim-container">
        <div class="reward-card">
            <div class="star-icon">⭐</div>
            <h1>Daily Reward</h1>
            <p id="reward-status">Loading your streak...</p>
            
            <div class="streak-dots" id="streak-container">
                </div>

            <button id="claim-btn" class="claim-button" disabled>Check Status</button>
            <p class="next-claim-hint" id="timer-text"></p>
        </div>
    </div>
    
    <script src="/global-settings.js"></script>
    <script src="/global-auth.js"></script>
    <script src="/navbar.js"></script>
    <script src="/daily/script.js"></script>
</body>
</html>
