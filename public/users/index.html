<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="/"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile • Pal</title>
    <script src="/global-settings.js" defer></script>
    <script src="/users/script.js" defer></script>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="stylesheet" href="/users/style.css">
</head>
<body class="auth-page">
    <div id="toast-container" class="toast-container"></div>

    <div class="auth-card profile-card public-view">
        <div class="auth-logo"><a href="/">PAL</a></div>
        
        <div class="profile-header">
            <div class="avatar-container" id="avatar-wrapper">
                <img id="display-avatar" src="/default-avatar.png" alt="Profile Picture">
            </div>
            <h1 id="display-name">Loading...</h1>
            <p id="display-username">@username</p>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-label">Rank</span>
                <div class="rank-wrapper">
                    <span id="stat-rank" class="stat-value">Member</span>
                    <small id="stat-xp-rank" style="display: block; font-size: 0.7rem; color: var(--blue-soft);"></small>
                </div>
            </div>
            <div class="stat-box">
                <span class="stat-label">Currency</span>
                <span id="stat-currency" class="stat-value">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Followers</span>
                <span id="stat-followers" class="stat-value">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Following</span>
                <span id="stat-following" class="stat-value">0</span>
            </div>
        </div>

        <div class="bio-display-container">
            <p id="display-bio" class="user-bio-text">No bio yet.</p>
        </div>

        <div class="xp-container">
            <div class="xp-info">
                <span id="xp-progress-label">XP Progress</span>
                <span id="stat-xp">0 XP</span>
            </div>
            <div class="xp-bar-bg">
                <div id="xp-bar-fill" class="xp-bar-fill" style="width: 0%"></div>
            </div>
        </div>

        <div class="profile-actions">
            <button id="follow-btn" class="auth-btn">Follow</button>
            <button id="message-btn" class="auth-btn secondary-btn" style="background: #e2e8f0; color: #1e293b; margin-top: 10px;">Message</button>
        </div>

        <a href="/" class="secondary-link">Return to Dashboard</a>
    </div>

    <div id="message-modal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(4px); z-index: 9999; justify-content: center; align-items: center;">
        <div class="modal-box" style="background: white; padding: 30px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.2);">
            <h3 style="color: var(--blue-deep); margin-bottom: 10px;">Send Message</h3>
            <p id="message-recipient" style="color: var(--blue-soft); font-size: 0.9rem; margin-bottom: 20px;">@username</p>
            <textarea id="modal-text" placeholder="Type your message here..." style="width: 100%; height: 120px; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; font-family: inherit; margin-bottom: 20px; resize: none;"></textarea>
            <div class="modal-buttons" style="display: flex; gap: 10px;">
                <button id="modal-send" class="auth-btn" style="margin-top: 0;">Send Message</button>
                <button id="modal-close" class="auth-btn secondary-btn" style="margin-top: 0; background: #e2e8f0; color: #1e293b;">Cancel</button>
            </div>
        </div>
    </div>
</body>
</html>
