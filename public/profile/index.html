<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile • Pal</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css"> </head>
    <link rel="icon" href="/favicon.png" type="image/png">
<body class="auth-page">
    <div id="toast-container" class="toast-container"></div>

    <div class="auth-card profile-card">
    <div class="auth-logo"><a href="/">PAL</a></div>
    <h1>Edit Profile</h1>
    
    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-label">Rank</span>
            <div class="rank-wrapper">
                <span id="stat-rank" class="stat-value">Member</span>
                <small id="stat-xp-rank"></small>
            </div>
        </div>
        <div class="stat-box">
            <span class="stat-label">Currency</span>
            <span id="stat-currency" class="stat-value">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Followers</span>
            <span id="stat-followers" class="stat-value">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Following</span>
            <span id="stat-following" class="stat-value">0</span>
        </div>
    </div>

    <div class="xp-container">
        <div class="xp-info">
            <span>Progress to next rank</span>
            <span id="stat-xp">0 XP</span>
        </div>
        <div class="xp-bar-bg">
            <div id="xp-bar-fill" class="xp-bar-fill" style="width: 0%"></div>
        </div>
    </div>

    <form id="profileForm">
        <button type="submit" class="auth-btn">Save Changes</button>
        <a href="/" class="secondary-link">Back to Dashboard</a>
    </form>
</div>
    
    <script src="global-settings.js"></script>
    <script src="script.js"></script>
</body>
</html>
