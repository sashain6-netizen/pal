<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat • Pal</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/pages/chat/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="icon" href="/favicon.png" type="image/png">
</head>
<body class="chat-body">
    <div class="chat-container">
        <header class="chat-header">
            <button onclick="location.href='/pages'" class="back-btn">← Back</button>
            <h2 id="chatName">Loading Chat...</h2>
            
            <div class="header-actions">
                <button id="inviteBtn" class="action-btn" style="display:none;" onclick="inviteUser()">Invite</button> 
                <button id="kickBtn" class="action-btn" style="display:none;" onclick="openKickModal()">Kick</button>
                
                <button id="leaveBtn" class="action-btn">Leave</button>
                <button id="deleteBtn" class="action-btn danger" style="display:none;">Delete</button>
            </div>
        </header>

        <div id="messageDisplay" class="message-area">
            </div>

        <form id="chatForm" class="chat-input-wrapper" onsubmit="sendMessage(event)">
            <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
            <button type="submit" class="send-btn">Send</button>
        </form>
    </div>
    <div id="confirmModal" class="modal-overlay" style="display:none;">
        <div class="modal-box"><div class="header-actions">
    <button id="inviteBtn" class="action-btn" style="display:none;" onclick="inviteUser()">Invite</button> 
    
    <button id="leaveBtn" class="action-btn">Leave</button>
    <button id="deleteBtn" class="action-btn danger" style="display:none;">Delete</button>
</div>
            <h3 id="confirmTitle">Confirm Action</h3>
            <p id="confirmMessage">Are you sure you want to do this?</p>
            <div class="modal-actions">
                <button id="cancelBtn" class="modal-btn secondary">Cancel</button>
                <button id="confirmBtn" class="modal-btn danger">Confirm</button>
            </div>
        </div>
    </div>
    <div id="inviteModal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h3>Invite a Pal</h3>
            <p>Enter the username of the person you want to add:</p>
            <input type="text" id="inviteInput" class="modal-input" placeholder="Username..." autocomplete="off">
            <div class="modal-actions">
                <button id="closeInviteBtn" class="modal-btn secondary">Cancel</button>
                <button id="sendInviteBtn" class="modal-btn primary">Add to Chat</button>
            </div>
        </div>
    </div>

    <div id="kickModal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h3>Kick a User</h3>
            <p>Enter the username of the person to remove:</p>
            <input type="text" id="kickInput" class="modal-input" placeholder="Username..." autocomplete="off">
            <div class="modal-actions">
                <button id="closeKickBtn" class="modal-btn secondary">Cancel</button>
                <button id="confirmKickBtn" class="modal-btn danger">Kick User</button>
            </div>
        </div>
    </div>

    <script src="/global-auth.js"></script>
    <script src="/navbar.js"></script>
    <script src="/global-settings.js"></script>
    <script src="/pages/chat/script.js"></script>
</body>
</html>
