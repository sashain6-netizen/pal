<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Reward • Pal</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/pages/style.css">
</head>
<body>
    <div class="container" style="margin-top: 100px;">
    <div class="forum-header">
        <h1>Community Forums</h1>
        <button onclick="openModal()" class="nav-btn">New Thread</button>
    </div>

    <div id="thread-list" class="thread-container">
        </div>
</div>

<div id="threadModal" class="modal" style="display:none;">
    <div class="modal-content feature-card">
        <h3>Create Thread</h3>
        <input type="text" id="threadTitle" placeholder="Thread Title">
        <textarea id="threadContent" placeholder="What's on your mind?"></textarea>
        <div class="modal-btns">
            <button onclick="closeModal()">Cancel</button>
            <button onclick="submitThread()" class="nav-btn">Post</button>
        </div>
    </div>
</div>
    
    <script src="/global-settings.js"></script>
    <script src="/global-auth.js"></script>
    <script src="/navbar.js"></script>
    <script src="/pages/script.js"></script>
</body>
</html>
