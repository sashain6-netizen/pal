<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forums • Pal</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/pages/style.css">
    <link rel="icon" href="/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="forum-header">
            <h1>Community Board</h1>
            <div class="tab-controls">
                <button class="tab-btn active" onclick="switchTab('public', event)">Public Threads</button>
                <button class="tab-btn" onclick="switchTab('private', event)">Private Chats</button>
            </div>
            <button class="nav-btn create-btn" onclick="openModal()">+ New Post</button>

            <div class="search-container">
                <input type="text" id="forumSearch" placeholder="Search titles or posts..." oninput="handleSearch()">
                <div id="searchResults" class="search-dropdown"></div>
            </div>
        </div>

        <div id="public-section" class="forum-section">
            <div id="thread-list" class="features-grid">
                </div>
        </div>

        <div id="private-section" class="forum-section" style="display: none;">
            <div id="chat-list" class="features-grid">
                </div>
        </div>
    </div>

    <div id="postModal" class="modal">
        <div class="modal-content feature-card">
            <h3 id="modalTitle">Create New Thread</h3>
            <div id="publicFields">
                <input type="text" id="newTitle" placeholder="Thread Title...">
                <textarea id="newContent" placeholder="What's on your mind?"></textarea>
            </div>
            <div id="privateFields" style="display: none;">
                <input type="text" id="roomName" placeholder="Group Name (Optional)">
                <input type="text" id="inviteUser" placeholder="Invite Username (Exact name)">
            </div>
            <div class="modal-actions">
                <button class="cancel-btn" onclick="closeModal()">Cancel</button>
                <button class="nav-btn" onclick="submitPost()">Post</button>
            </div>
        </div>
    </div>

    <script src="/global-settings.js"></script>
    <script src="/global-auth.js"></script>
    <script src="/navbar.js"></script>
    <script src="/pages/script.js"></script>
</body>
</html>
