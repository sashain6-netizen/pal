<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discussion • Pal</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/pages/thread/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="icon" href="/favicon.png" type="image/png">
</head>
<body>
        <div class="container" style="margin-top: 120px;">
        <div class="thread-header feature-card">
            <a href="/pages" class="back-link">← Back to Board</a>
            <h1 id="thread-title">Loading Thread...</h1>
        </div>

        <div id="posts-container">
            </div>
    </div>
    <div class="reply-box">
        <textarea id="replyText" placeholder="What's on your mind? Share your thoughts..."></textarea>
        <div class="reply-actions"><button class="reply-btn" onclick="postReply()">Post Reply</button>
        </div>
    </div>

    <div id="deleteModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon">⚠️</div>
            <h2>Delete Thread?</h2>
            <p>Are you sure you want to delete this? This action is permanent and will remove all replies.</p>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeDeleteModal()">Cancel</button>
                <button class="btn-danger" id="confirmDeleteBtn">Yes, Delete It</button>
            </div>
        </div>
    </div>

    <script src="/global-auth.js"></script>

    <script src="/navbar.js"></script>
    <script src="/pages/thread/script.js"></script>
</body>
</html>
