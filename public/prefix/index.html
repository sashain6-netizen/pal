<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market • Pal</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/shop/style.css">
</head>
<body>

    <nav class="navbar" id="main-nav"></nav>

    <main class="shop-container">
        <header class="shop-header">
            <div class="logo-wrapper">
                <h1>Prefix Market</h1>
                <p class="tagline visible">Customize your presence</p>
            </div>
            
            <div class="user-stats-bar">
                <div class="stat-item">
                    <span class="stat-label">Balance:</span>
                    <span id="balance" class="stat-value">0</span> 💰
                </div>
                <div class="stat-item">
                    <span class="stat-label">Active Prefix:</span>
                    <span id="active-prefix" class="stat-value">None</span>
                </div>
            </div>
        </header>

        <div id="shop-grid" class="features-grid">
            <div class="loading-spinner">Loading items...</div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="/global-settings.js"></script>
    <script src="/global-auth.js"></script>
    <script src="/navbar.js"></script>
    <script src="/shop/script.js"></script>
</body>
</html>
