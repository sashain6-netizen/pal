<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up • Pal</title>
  <link rel="stylesheet" href="../style.css"> <style>
    .auth-page { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--off-white); }
    .auth-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(37,99,235,0.1); width: 100%; max-width: 380px; text-align: center; border: 1px solid rgba(37,99,235,0.05); }
    .auth-card h1 { color: var(--blue-deep); margin-bottom: 30px; font-size: 1.8rem; }
    .input-box { text-align: left; margin-bottom: 20px; }
    .input-box label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--blue-soft); }
    .input-box input { width: 100%; padding: 12px 15px; border-radius: 12px; border: 2px solid #f0f4ff; font-family: inherit; transition: 0.3s; }
    .input-box input:focus { border-color: var(--blue-primary); outline: none; }
    .submit-btn { width: 100%; padding: 14px; margin-top: 10px; }
    .switch-link { margin-top: 20px; font-size: 0.85rem; }
    .switch-link a { color: var(--blue-primary); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body class="auth-page">

  <div class="auth-card">
    <h1>Create Account</h1>
    <div class="input-box">
      <label>Username</label>
      <input type="text" id="username" placeholder="Pick a username">
    </div>
    <div class="input-box">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="nav-btn submit-btn" onclick="submitAuth()">Sign Up</button>
    <p class="switch-link">Already a pal? <a href="/login">Login</a></p>
  </div>

  <script>
    async function submitAuth() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      // This calls the file in /functions/api/signup.js
      const response = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (response.ok) {
        alert("Success! Welcome to Pal.");
        window.location.href = "/login";
      } else {
        const error = await response.text();
        alert("Error: " + error);
      }
    }
  </script>
</body>
</html>
