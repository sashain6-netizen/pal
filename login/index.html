<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • Pal</title>
  <link rel="stylesheet" href="../style.css">
  </head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo"><a href="/">PAL</a></div>
    <h1>Welcome Back</h1>
    <p>Log in to access your school tools.</p>

    <form id="loginForm">
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Your username" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="nav-btn auth-btn">Log In</button>
    </form>

    <p class="switch-link">New here? <a href="/signup">Create an account</a></p>
  </div>

  <script src="../script.js"></script>
  <script src="script.js"></script>
  </script>
</body>
</html>
